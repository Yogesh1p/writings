<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yogesh — Writing</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/base.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Lora', Georgia, serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .layout {
      max-width: 860px;
      margin: 0 auto;
      padding: 4rem 2.5rem 6rem;
    }

    /* ── Page intro ── */
    .intro {
      padding-bottom: 3rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }
    .intro-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .controls-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .search-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-icon {
      position: absolute;
      left: 1.1rem;
      width: 15px;
      height: 15px;
      color: var(--muted);
      pointer-events: none;
      z-index: 2;
      transition: color 0.3s;
    }
    .search-wrap:focus-within .search-icon { color: var(--accent); }
    .archive-search {
      border: 1px solid var(--border);
      border-radius: 30px;
      background: var(--surface);
      color: var(--text);
      padding: 0.75rem 1rem 0.75rem 2.6rem;
      font-family: 'Lora', serif;
      font-size: 1rem;
      font-style: italic;
      width: 240px;
      outline: none;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .archive-search::placeholder { color: var(--muted); opacity: 0.6; }
    .archive-search:hover { border-color: rgba(212,140,112,0.4); }
    .archive-search:focus {
      width: 300px;
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(45,36,30,0.08);
      transform: translateY(-1px);
    }
    [data-theme="dark"] .archive-search:focus { box-shadow: 0 8px 24px rgba(0,0,0,0.4); }

    .tally {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Filter / Sort chips ── */
    .dropdown-wrapper { position: relative; display: inline-block; }
    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
    }
    .chip:hover, .dropdown-wrapper.active .chip {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }
    .icon-chip { padding: 0.75rem; border-radius: 50%; }
    .dropdown-menu {
      position: absolute;
      top: calc(100% + 0.5rem);
      right: 0; left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(45,36,30,0.08);
      min-width: 160px;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    [data-theme="dark"] .dropdown-menu { box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
    .dropdown-wrapper.active .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
    .dropdown-item {
      padding: 0.8rem 1.2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text);
      background: transparent;
      border: none;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: normal; line-height: 1.4;
    }
    .dropdown-item:hover { background: var(--bg); color: var(--accent); }
    .dropdown-item.selected { background: var(--bg); color: var(--accent); position: relative; }
    .dropdown-item.selected::before { content: '•'; position: absolute; left: 0.45rem; color: var(--accent); }

    /* ── Article rows ── */
    .articles-list { display: flex; flex-direction: column; gap: 1rem; }

    .post-row {
      display: grid;
      grid-template-columns: 130px 1fr 36px;
      align-items: center;
      gap: 1.75rem;
      padding: 1.75rem 2rem;
      text-decoration: none;
      color: inherit;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
      opacity: 0;
      transform: translateY(10px);
      animation: rowIn 0.4s forwards;
    }
    .post-row:hover {
      border-color: rgba(212,140,112,0.5);
      box-shadow: 0 8px 28px rgba(45,36,30,0.07);
      transform: translateY(-2px);
      background: var(--bg);
    }
    [data-theme="dark"] .post-row:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.35); }

    .row-meta { display: flex; flex-direction: column; gap: 0.3rem; }
    .row-category {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
    }
    .row-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .row-title {
      font-family: 'Lora', serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--dark);
      margin: 0 0 0.3rem;
      line-height: 1.3;
    }
    .row-desc {
      font-size: 0.92rem;
      color: var(--muted);
      margin: 0;
      line-height: 1.55;
    }
    .row-arrow {
      text-align: right;
      color: var(--border);
      font-size: 1.15rem;
      transition: color 0.25s, transform 0.25s;
    }
    .post-row:hover .row-arrow { color: var(--accent); transform: translateX(4px); }

    .empty-state {
      padding: 4rem 0;
      text-align: center;
      font-style: italic;
      color: var(--muted);
      opacity: 0.7;
    }

    @keyframes rowIn { to { opacity: 1; transform: none; } }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .layout { padding: 2.5rem 1.25rem 4rem; }
      .post-row { grid-template-columns: 1fr; gap: 0.75rem; padding: 1.25rem; }
      .row-arrow { display: none; }
      .controls-left { width: 100%; }
      .search-wrap { flex: 1; min-width: 0; }
      .archive-search { width: 100%; }
      .archive-search:focus { width: 100%; transform: none; }
      .dropdown-menu { max-width: calc(100vw - 3rem); }
    }
  </style>
</head>
<body>

  <div id="global-nav" data-root="/" data-sticky="true"></div>

  <main class="layout">

    <div class="intro">
      <div class="intro-label">Writing</div>
    </div>

    <div class="controls">
      <div class="controls-left">

        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input id="articleSearch" class="archive-search" type="text" placeholder="Search..." autocomplete="off" />
        </div>

        <div class="dropdown-wrapper" id="filterDropdown">
          <button id="filterToggle" class="chip icon-chip" aria-label="Filter">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
            </svg>
          </button>
          <div class="dropdown-menu" id="filterMenu"></div>
        </div>

        <div class="dropdown-wrapper" id="sortDropdown">
          <button id="sortToggle" class="chip icon-chip" aria-label="Sort">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline>
            </svg>
          </button>
          <div class="dropdown-menu" id="sortMenu"></div>
        </div>

      </div>
      <span class="tally" id="tally"></span>
    </div>

    <section id="articlesList" class="articles-list"></section>

  </main>

  <script src="/js/base.js"></script>
  <script src="/js/components.js"></script>

  
<script>
    window.ARTICLES = [
      
      {
        title: "Making Room for Meaning",
        description: "Why meaning asks for integration.",
        date: "2026-04-06",
        category: "Philosophy",
        readingTime: 5,
        url: "/making-room-for-meaning/",
        keywords: "meaning, identity, philosophy"
      }
      
    ];
  </script>
  

  <script>
  document.addEventListener("DOMContentLoaded", () => {
    const list        = document.getElementById("articlesList");
    const searchInput = document.getElementById("articleSearch");
    const tallyEl     = document.getElementById("tally");
    const filterMenu  = document.getElementById("filterMenu");
    const sortMenu    = document.getElementById("sortMenu");

    // Pull directly from the Jekyll-generated window object
    const articles = window.ARTICLES || [];
    const categories = ["all", ...new Set(articles.map(a => a.category).filter(Boolean))];
    const sortModes  = ["recent", "oldest", "az", "za"];
    const sortLabels = ["Recent first", "Oldest first", "A–Z", "Z–A"];

    let catIdx = 0, sortIdx = 0;

    function renderDropdowns() {
      filterMenu.innerHTML = categories.map((c, i) => `
        <button class="dropdown-item ${i===catIdx?'selected':''}" data-idx="${i}">
          ${c === "all" ? "All" : c}
        </button>`).join("");
      sortMenu.innerHTML = sortModes.map((m, i) => `
        <button class="dropdown-item ${i===sortIdx?'selected':''}" data-idx="${i}">
          ${sortLabels[i]}
        </button>`).join("");
    }

    function closeAll() {
      document.querySelectorAll('.dropdown-wrapper').forEach(w => w.classList.remove('active'));
    }

    document.getElementById('filterToggle').addEventListener('click', e => {
      e.stopPropagation();
      const w = e.currentTarget.closest('.dropdown-wrapper');
      const was = w.classList.contains('active');
      closeAll();
      if (!was) w.classList.add('active');
    });
    document.getElementById('sortToggle').addEventListener('click', e => {
      e.stopPropagation();
      const w = e.currentTarget.closest('.dropdown-wrapper');
      const was = w.classList.contains('active');
      closeAll();
      if (!was) w.classList.add('active');
    });
    document.addEventListener('click', closeAll);

    filterMenu.addEventListener('click', e => {
      if (e.target.classList.contains('dropdown-item')) {
        catIdx = parseInt(e.target.dataset.idx);
        renderDropdowns(); update();
      }
    });
    sortMenu.addEventListener('click', e => {
      if (e.target.classList.contains('dropdown-item')) {
        sortIdx = parseInt(e.target.dataset.idx);
        renderDropdowns(); update();
      }
    });

    function score(a, q) {
      let s = 0;
      if ((a.title       ||"").toLowerCase().includes(q)) s += 5;
      if ((a.keywords    ||"").toLowerCase().includes(q)) s += 3;
      if ((a.category    ||"").toLowerCase().includes(q)) s += 2;
      if ((a.description ||"").toLowerCase().includes(q)) s += 1;
      return s;
    }

    function render(items) {
      if (!items.length) {
        list.innerHTML = `<p class="empty-state">Nothing matches. Try a different search.</p>`;
        return;
      }
      list.innerHTML = items.map((a, i) => {
        const d = a.date ? new Date(a.date).toLocaleDateString('en-GB', {
          day:'numeric', month:'short', year:'numeric', timeZone:'UTC'
        }) : '';
        return `
        <a class="post-row" href="${a.url || '#'}" style="animation-delay:${i * 0.045}s">
          <div class="row-meta">
            <span class="row-category">${a.category || ''}</span>
            <span class="row-date">${d}</span>
            ${a.readingTime ? `<span class="row-date">${a.readingTime} min</span>` : ''}
          </div>
          <div>
            <div class="row-title">${a.title}</div>
            <div class="row-desc">${a.description || ''}</div>
          </div>
          <div class="row-arrow">→</div>
        </a>`;
      }).join("");
    }

    function update() {
      const q   = searchInput.value.trim().toLowerCase();
      const cat = categories[catIdx];
      let out = articles.filter(a => (!q || score(a,q) > 0) && (cat === "all" || a.category === cat));

      if (q) {
        out.sort((a, b) => score(b,q) - score(a,q));
      } else {
        switch (sortModes[sortIdx]) {
          case "recent":  out.sort((a,b) => new Date(b.date) - new Date(a.date)); break;
          case "oldest":  out.sort((a,b) => new Date(a.date) - new Date(b.date)); break;
          case "az":      out.sort((a,b) => a.title.localeCompare(b.title));      break;
          case "za":      out.sort((a,b) => b.title.localeCompare(a.title));      break;
        }
      }

      tallyEl.textContent = `${out.length} piece${out.length !== 1 ? 's' : ''}`;
      render(out);
    }

    searchInput.addEventListener("input", update);
    renderDropdowns();
    update();
  });
  </script>
</body>
</html>
