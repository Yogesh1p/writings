<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>[Title]</title>

  <!-- ── Article metadata ─────────────────────────────────── -->
  <!-- Edit these. They drive the auto-injected header.        -->
  <meta name="title"       content="Your Title Here">
  <meta name="description" content="One sentence summary.">
  <meta name="category"    content="Philosophy">
  <meta name="author"      content="Yogesh">
  <meta name="date"        content="2026-04-07">
  <meta name="keywords"    content="tag1, tag2, tag3">
  <meta name="reading_time" content="5">
  <!-- ─────────────────────────────────────────────────────── -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/articles.css">

  <!-- Instant theme (no flash) -->
  <script>
    (() => {
      const t = localStorage.getItem("theme") || "light";
      if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>

  <!-- MathJax (remove if you don't use math) -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$','$'],['\\(','\\)']],
        displayMath: [['$$','$$'],['\\[','\\]']],
        processEscapes: true
      },
      svg: { fontCache: "global" }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>

  <!-- Navigation (data-root points up one level to site root) -->
  <div id="global-nav" data-root="../" data-sticky="true"></div>

  <div class="reading-progress"></div>

  <main class="page-wrap">
    <div class="article-layout">
      <div class="reading-container">
        <article class="reading-content">

          <!-- Auto-injected title / meta header -->
          <div id="article-header"></div>

          <!-- ── YOUR ARTICLE CONTENT GOES BELOW ── -->
          <section class="article-body">

            <p>Start writing here. Every <code>&lt;p&gt;</code> in this section is your essay.</p>

            <h2>A Section Heading</h2>

            <p>Continue writing...</p>

          </section>
          <!-- ── END CONTENT ── -->

        </article>
      </div>
    </div>
  </main>

  <script src="../js/base.js" defer></script>
  <script src="../js/components.js" defer></script>
  <script src="../js/article_components.js" defer></script>

</body>
</html>
