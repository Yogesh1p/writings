<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>

  <meta name="description" content="{{ page.description }}">
  <meta name="category" content="{{ page.category }}">
  <meta name="author" content="{{ page.author }}">
  <meta name="date" content="{{ page.date | date: '%Y-%m-%d' }}">
  <meta name="keywords" content="{{ page.keywords }}">
  <meta name="reading_time" content="{{ page.reading_time }}">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ '/css/base.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/articles.css' | relative_url }}">

  <script>
    (() => {
      const t = localStorage.getItem("theme") || "light";
      if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
</head>
<body>

  <div id="global-nav" data-root="/" data-sticky="true"></div>
  <div class="reading-progress"></div>

  <main class="page-wrap">
    <div class="article-layout">
      <div class="reading-container">
        <article class="reading-content">

          <div id="article-header"></div>

          <section class="article-body">
            {{ content }}
          </section>

        </article>
      </div>
    </div>
  </main>

<script src="{{ '/js/base.js' | relative_url }}" defer></script>
  <script src="{{ '/js/components.js' | relative_url }}" defer></script>
  <script src="{{ '/js/article_components.js' | relative_url }}" defer></script>

</body>
</html>
